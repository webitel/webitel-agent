# =========================================================================
# API SPECIFICATION: WEBITEL DESKTRACK v1.1.0
# Core: Unified WebRTC Media & WebSocket Signaling
# =========================================================================

info:
  name: "Webitel DeskTrack"
  version: "1.1.0"
  protocols: [HTTPS, WSS, WebRTC]
  security: { header: "X-Webitel-Access", dependencies:: "All HTTPS requests and WebSocket handshakes must include this token." }

# -------------------------------------------------------------------------
# 1. WEBRTC MEDIA ENGINE (Live & Recording)
# -------------------------------------------------------------------------
webrtc_engine:
  signaling_endpoint: "/api/webrtc/video"

  sdp_workflow:
    initiation: "POST /api/webrtc/video (SDP Offer -> Answer)"
    termination: "DELETE /api/webrtc/video (Teardown session)"
    ice_policy: { gather: "all", timeout: "10s", stun_turn: "dynamic_config" }

  video_stream:
    codecs: ["VP8", "H.264 Baseline/Main"]
    params: { res: "1280x720", fps: 15, bitrate: "5Mbps", pix_fmt: "yuv420p" }
    engine: { win: "FFmpeg/gdigrab", mac: "Native ScreenCapturer" }

  audio_data_channel:
    label: "audio_stream"
    protocol: "WebRTC DataChannel (Reliable/Unordered)"
    format: "MP3 (libmp3lame) via binary stdout pipe"
    streaming: { chunk_size: "4096B", sample_rate: "44.1kHz", bitrate: "48kbps" }
    mixing: "FFmpeg amix (System Audio + Mic Input)"

  telemetry: [bitrate, fps, rtt, packet_loss, nack_pli_count]

# -------------------------------------------------------------------------
# 2. WEBSOCKET PROTOCOL (WSS Control Plane)
# -------------------------------------------------------------------------
websocket:
  endpoint: "wss://{domain}/ws/websocket"

  inbound:
    hello: "Connection handshake & auth handshake trigger"
    agent_status: "Presence sync (online, offline, pause)"
    call:
      events: [ringing, update, hangup]
      trigger: "Start WebRTC session if 'record_screen: true'"
    channel:
      status: [missed, waiting, wrap_time]
      logic: "Maintain capture during 'Post-Processing' (has_reporting: true)"
    notification:
      commands: [screen_share, screenshot, screen_record_start, screen_record_stop]
      ack_required: true

  outbound:
    auth: { action: "authentication_challenge", token: "string" }
    session: { action: "agent_session", desc: "Context recovery" }
    ack: { ack_id: "uuid", error: "string?" }
    ss_accept: { sdp: "local_answer", target_id: "manager_id" }

  resilience:
    queue: "Sequential 'seq' dispatch with 5ms pacing"
    recovery: "Exponential backoff (5s); Force-stop on OS 'network: none'"

# -------------------------------------------------------------------------
# 3. PERSISTENCE (REST Storage)
# -------------------------------------------------------------------------
storage_api:
  path: "/api/storage/file/{id}/upload"
  methods:
    POST_PNG: "Snapshot upload via PeriodicScreenshotService"
    POST_MP4: "Multipart session recording upload (Retry: 3x, Delay: 2s)"
  params: { channel: "screensharing", thumbnail: true, access_token: "string" }