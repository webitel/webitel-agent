# =========================================================================
# API SPECIFICATION: WEBITEL DESKTRACK v1.1.0
# Core: Monitoring, Multi-Platform Capture & Unified WebRTC Transport
# =========================================================================

info:
  name: "Webitel DeskTrack"
  version: "1.1.0"
  protocols: [HTTPS, WSS, WebRTC]
  security: { header: "X-Webitel-Access", description:: "All HTTPS requests and WebSocket handshakes must include this token." }

# -------------------------------------------------------------------------
# 1. SCREENSHOT SERVICE (Automated Background Capture)
# -------------------------------------------------------------------------
screenshot_service:
  logic:
    checker: "Polling agentId/permissions/interval every 15s"
    scheduling: "Dynamic Timer based on 'screenshot_interval' (mins)"
    execution:
      guards: ["_screenshotInProgress (concurrent lock)", "_minScreenshotGap (1s)"]
      platforms:
        windows: "DesktopScreenshot (direct bytes)"
        macos: "ScreenCapturer (temp file path + file read)"

  upload_api:
    path: "/api/storage/file/{agentId}/upload"
    method: "POST"
    headers: { Content-Type: "image/png" }
    query:
      channel: "screenrecording"
      name: "scr_ss_{agentId}_{YYYY-MM-DD}_{HH-mm-ss}.png"
      thumbnail: "true"

# -------------------------------------------------------------------------
# 2. WEBRTC MEDIA ENGINE (Live Streaming)
# -------------------------------------------------------------------------
webrtc_engine:
  video:
    codec: "VP8 / H.264 (Baseline/Main)"
    params: { res: "1280x720", fps: 15, bitrate: "5Mbps", flags: "+faststart" }
    logic:
      win: "FFmpeg (gdigrab) - captureAllDesktopScreensWindows"
      mac: "Native ScreenCapturer - captureDesktopScreen"

  audio_transport:
    method: "WebRTC DataChannel (Binary Stream)"
    label: "audio_stream"
    protocol: "Reliable / Unordered"
    format: "MP3 (via libmp3lame)"
    parameters:
      bitrate: "48kbps"
      sampling_rate: "44.1kHz"
      chunk_size: "4096 Bytes"
    mixing_logic:
      filter: "amix=inputs=2:duration=first"
      sources:
        - "Stereo Mix (Windows System Sound / Loopback / User Microphone)"
        - "Microphone (Dshow / AVFoundation)"
      pipe: "FFmpeg stdout -> Binary DataChannel Message"

  telemetry:
    interval: "1s"
    metrics: ["ACTUAL_BITRATE", "AVG_ENCODE_TIME", "RTT", "ICE_STATE", "NACK/PLI"]

# -------------------------------------------------------------------------
# 3. WEBSOCKET PROTOCOL (State Machine & Control)
# -------------------------------------------------------------------------
websocket:
  endpoint: "wss://{domain}/ws/websocket"

  state_management:
    sync: "PeriodicStateCheck (5s) for activeCalls & postProcessing"
    queuing: "Sequential 'seq' increment with 5ms dispatch pacing"
    resilience: "Exponential backoff (5s); Force-stop on connectivity:none"

  event_matrix:
    inbound:
      hello: "Auth challenge trigger"
      call:
        ringing: "Checks record_screen:true -> Starts screen recording"
        hangup: "Removes callId from active list"
      channel:
        logic: "Tracks has_reporting (Wrap-up time)"
        exit_states: ["missed", "waiting", "wrap_time"]
      notification:
        actions: [screen_share, screenshot, screen_record_start, screen_record_stop]
        ack: "Mandatory response via ack_id"

    outbound:
      auth: { action: "authentication_challenge", token: "string" }
      session: { action: "agent_session", desc: "AgentID recovery" }
      ss_accept: { action: "ss_accept", sdp: "answer", to_user_id: "id" }

# -------------------------------------------------------------------------
# 4. LOCAL RECORDING & FFmpeg PIPELINE
# -------------------------------------------------------------------------
recording_engine:
  # --- Windows Logic: GDI & DirectShow ---
  windows_logic:
    video_provider: "gdigrab (Desktop capture)"
    audio_provider: "dshow (DirectShow)"
    audio_capture:
      system_audio: "Stereo Mix (Realtek/Virtual Audio Loopback)"
      user_audio: "Microphone (Physical input device)"
    pipeline_params:
      v_codec: "libx264 (H.264 Software Encoder)"
      preset: "ultrafast (Minimize CPU overhead)"
      bitrate: "5M"
      framerate: 15
      pix_fmt: "yuv420p"
      flags: "+faststart (Enables instant playback/streaming of MP4)"
    mixing_logic:
      filter: "amix=inputs=2:duration=first"
      desc: "Combines Stereo Mix and Mic into a single stereo output track."

  # --- macOS Logic: AVFoundation & Hardware Accel ---
  macos_logic:
    video_provider: "avfoundation (Native framework)"
    discovery:
      command: "ffmpeg -f avfoundation -list_devices true -i 0"
      logic: "Regex parsing of [index] Capture screen to identify active monitors."
    hardware_accel: "h264_videotoolbox (Apple Silicon/Intel Hardware Encoder)"

    multi_monitor_processing:
      single_screen: "scale=1280:720"
      multi_screen_hstack:
        logic: "Scaling each input to 1280x720 and horizontally stacking (hstack)."
        filter_complex: "[0:v]scale=1280:720[v0];[1:v]scale=1280:720[v1];[v0][v1]hstack=inputs=2"

    pipeline_params:
      pix_fmt: "nv12 (Native macOS pixel format)"
      output_pix_fmt: "yuv420p (Cross-platform compatibility)"
      movflags: "+faststart"


# -------------------------------------------------------------------------
# 5. OBSERVABILITY & TELEMETRY (OpenTelemetry)
# -------------------------------------------------------------------------
observability:
  engine: "OpenTelemetry (OTel) Collector"
  transport: "gRPC (Insecure channel for internal networks)"
  service_name: "webitel-desk-track"

  logging_stack:
    client: "OtelLogClient (Protobuf/gRPC)"
    proto_definitions:
      - "opentelemetry.proto.collector.logs.v1"
      - "opentelemetry.proto.logs.v1"
    resource_attributes:
      service.name: "webitel-desk-track"
      deployment.environment: "production" # dynamic

  log_record_structure:
    timestamp: "UnixNano (DateTime.now().microsecondsSinceEpoch * 1000)"
    body: "AnyValue (String message)"
    severity: ["INFO", "WARN", "ERROR", "DEBUG"]

  export_logic:
    method: "export(ExportLogsServiceRequest)"
    error_handling: "Silent fail with local logger fallback to avoid recursion"
