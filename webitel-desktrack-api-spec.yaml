# =========================================================================
# API SPECIFICATION: WEBITEL DESKTRACK
# Version: 1.1.0
# Description: Detailed REST, WebRTC Signaling, and Media Protocol
# =========================================================================

app_name: "Webitel DeskTrack"
protocols: [HTTPS, WSS, WebRTC]

# -------------------------------------------------------------------------
# 1. AUTHENTICATION & HEADERS
# -------------------------------------------------------------------------
security:
  primary_header: "X-Webitel-Access"
  description: "All HTTPS requests and WebSocket handshakes must include this token."

# -------------------------------------------------------------------------
# 2. REST API: CONFIGURATION & PERMISSIONS
# -------------------------------------------------------------------------
rest_configuration_api:

  - endpoint: "/api/call_center/agents"
    method: "GET"
    description: "Polls specific agent permissions to determine if monitoring is allowed."
    query_parameters:
      id: "Integer - The Agent ID"
      fields: "String - Set to 'screen_control' to minimize payload"
      page: "Integer - Default 1"
      size: "Integer - Default 1"
    success_response:
      schema:
        items:
          - id: "Integer"
            screen_control: "Boolean - If false, the app must ignore all recording triggers"

  - endpoint: "/api/settings"
    method: "GET"
    description: "Retrieves global system-wide settings for the monitoring service."
    query_parameters:
      name: "String - 'screenshot_interval'"
    success_response:
      schema:
        items:
          - name: "screenshot_interval"
            value: "String (Integer) - Interval in minutes (e.g., '30')"

# -------------------------------------------------------------------------
# 3. REST API: STORAGE & SCREENSHOTS
# -------------------------------------------------------------------------
rest_storage_api:

  - endpoint: "/api/storage/file/{agentId}/upload"
    method: "POST"
    description: "Uploads a binary PNG screenshot captured by the background service."
    path_parameters:
      agentId: "Integer - Owner of the file"
    query_parameters:
      channel: "String - Hardcoded to 'screensharing'"
      access_token: "String - Token for storage authorization"
      thumbnail: "Boolean - Request server to generate a preview"
      name: "String - Standardized filename: scr_ss_{agentId}_{YYYY-MM-DD}_{HH-mm-ss}.png"
    headers:
      Content-Type: "image/png"
    request_body: "Raw binary data of the PNG image"
    expected_status: "201 Created / 200 OK"

# -------------------------------------------------------------------------
# 4. WEBRTC SIGNALING (Signaling Channel)
# -------------------------------------------------------------------------
webrtc_signaling:

  - endpoint: "/api/webrtc/video"
    method: "POST"
    description: "Asynchronous SDP exchange to initiate live screen streaming."
    request_payload:
      type: "String - Hardcoded as 'offer'"
      sdp_offer: "String - The local SDP (Session Description Protocol) generated by the app"
      uuid: "String - Unique session ID for the recording/stream"
      name: "String - Filename for the server-side recording (e.g., recording_ss_{id}_{date}.mp4)"
    response_payload:
      sdp_answer: "String - The server's SDP answer to complete the handshake"
      id: "String - The unique Stream ID generated by the server"

  - endpoint: "/api/webrtc/video"
    method: "DELETE"
    description: "Terminates the server-side media listener and closes the recording file."
    headers:
      X-Webitel-Access: "Required"
    expected_status: "200 OK"

# -------------------------------------------------------------------------
# 5. WEBRTC MEDIA PARAMETERS (Data Channel)
# -------------------------------------------------------------------------
webrtc_media_specs:
  codecs:
    video: "VP8 / H.264 (Profile: Baseline/Main)"
    audio: "Opus (Stereo, 48kHz) - Used for system audio capture on Windows"
  ice_gathering:
    policy: "all"
    timeout: "10 seconds"
    servers: "STUN/TURN as provided in the app configuration"
  streaming_logic:
    windows: "Captures multi-screen setup using FFmpeg-based streaming"
    macos: "Captures primary desktop via Native ScreenCapturer"
  metrics_monitored:
    - "Bitrate (kbps): Target vs. Actual"
    - "FPS (Frames Per Second)"
    - "RTT (Round Trip Time) in milliseconds"
    - "Packet Loss / NACK / PLI counts"
    - "Resolution (Width x Height)"


# =========================================================================
# VIDEO RECORDING & UPLOAD SPECIFICATION
# Components: FFmpeg Capture, Audio Mixing, and Multipart REST Upload
# =========================================================================

video_processing_logic:

  # --- LOCAL RECORDING (Windows FFmpeg) ---
  local_capture_engine:
    provider: "FFmpeg (gdigrab for video / dshow for audio)"
    video_parameters:
      codec: "libx264"
      preset: "ultrafast"
      framerate: 15
      resolution: "1280x720"
      pixel_format: "yuv420p"
      bitrate: "5M"
      flags: "+faststart" # Optimizes MP4 for web streaming
    audio_mixing:
      filter: "amix=inputs=2"
      sources:
        - "Stereo Mix (System Audio Output)"
        - "Microphone (User Voice Input)"
      output_codec: "libmp3lame (MP3)"
      sample_rate: "44100Hz"
      bitrate: "48k"

  # --- REAL-TIME AUDIO STREAMING ---
  realtime_audio_transport:
    protocol: "WebRTC DataChannel"
    mimetype: "audio/mp3"
    streaming_logic: "Binary stdout pipe from FFmpeg to DataChannel"
    chunk_size: "4096 bytes"

# -------------------------------------------------------------------------
# REST API: MULTIPART VIDEO UPLOAD
# -------------------------------------------------------------------------
video_upload_api:
  path: "/api/storage/file/{callId}/upload"
  method: "POST"
  description: "Uploads the final MP4 recording file to Webitel Storage"
  headers:
    X-Webitel-Access: "Required (Agent Token)"
    Content-Type: "multipart/form-data"
  path_parameters:
    callId: "UUID - Session or Call identifier"
  query_parameters:
    channel: "screensharing (Fixed)"
    access_token: "Storage access token"
    thumbnail: "true (Triggers server-side preview generation)"
    start_time: "Unix Timestamp in ms (Recording Start)"
    end_time: "Unix Timestamp in ms (Recording End)"
  multipart_payload:
    file: "The .mp4 binary file"
  reliability:
    retry_policy: "3 attempts"
    delay_between_retries: "2 seconds"


# =========================================================================
# SECTION: WEBSOCKET PROTOCOL DETAILS (WSS)
# Protocol: JSON over Secure WebSockets
# Endpoint: wss://{domain}/ws/websocket
# =========================================================================
websocket_protocol:

  # -----------------------------------------------------------------------
  # INBOUND EVENTS (Server -> App)
  # -----------------------------------------------------------------------
  inbound_events:
    - event: "hello"
      description: "Handshake confirmation. Sent by the server immediately after a successful connection."
      purpose: "Validates connection health and triggers the authentication challenge."

    - event: "agent_status"
      description: "Broadcasts changes in the agent's presence."
      values: ["online", "offline", "pause", "unknown"]
      logic: "Updates the Application Tray icon and internal state machine."

    - event: "call"
      description: "High-level call control events."
      sub_events:
        ringing: "Triggers screen recording if 'record_screen' is true."
        update: "Updates call metadata (e.g., transfer or bridge)."
        hangup: "Signals the end of a call; triggers transition to post-processing or idle."
      critical_fields:
        record_screen: "Boolean - If true, the app MUST start capturing media."
        id: "UUID - Used as the 'root_id' for recording files."

    - event: "channel"
      description: "Low-level SIP channel state updates. Crucial for tracking 'Post-Processing' (Wrap-up) time."
      logic: "If 'distribute.has_reporting' is true, the app keeps recording even after the call ends until a 'missed', 'waiting', or 'wrap_time' status is received."
      states: ["missed", "waiting", "wrap_time"]

    - event: "notification"
      description: "The primary command interface for remote management."
      actions:
        screen_share: "Triggers WebRTC negotiation (SDP Offer received in body)."
        screenshot: "Triggers the ScreenshotSenderService to capture and upload a PNG via REST."
        screen_record_start: "Manual trigger to start recording (outside of a call)."
        screen_record_stop: "Manual trigger to stop recording."
      acknowledgment: "Requires an 'ack' action back to the server using 'ack_id'."

  # -----------------------------------------------------------------------
  # OUTBOUND ACTIONS (App -> Server)
  # -----------------------------------------------------------------------
  outbound_actions:
    - action: "authentication_challenge"
      description: "The first action sent by the app to verify the session."
      payload: { "token": "String" }
      response: "AuthResponse object with agent details."

    - action: "agent_session"
      description: "Requests the current agent's session data."
      purpose: "Used to recover the 'agent_id' if it's missing from local storage."

    - action: "ack"
      description: "Confirms receipt and processing of a 'notification' event."
      payload:
        ack_id: "String"
        error: "String (Optional - contains stack trace if processing failed)"

    - action: "ss_accept"
      description: "The response to a 'screen_share' notification."
      payload:
        id: "The original notification ID"
        sdp: "The local WebRTC SDP Answer"
        to_user_id: "The ID of the manager/user requesting the stream"
        session_id: "The parent session UUID"

  # -----------------------------------------------------------------------
  # INTERNAL LOGIC & STATE MANAGEMENT
  # -----------------------------------------------------------------------
  internal_logic:
    sequence_numbering: "Every outbound request increments the 'seq' integer. Server replies with 'seq_reply' to match requests."
    outgoing_queue: "Requests are queued if the socket is busy or reconnecting. Sent sequentially with a 5ms delay."
    reconnection_strategy: "Exponential backoff (5 seconds default). Clears pending requests and stops active recordings on total disconnect."
    connectivity_monitoring: "App listens to OS-level network changes. If 'none', all recordings and streams are forcefully closed to prevent data corruption."