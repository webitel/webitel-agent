# =========================================================================
# API SPECIFICATION: WEBITEL DESKTRACK v1.1.0
# Core: Monitoring, Screen Capture & WebRTC Signaling
# =========================================================================

info:
  name: "Webitel DeskTrack"
  protocols: [HTTPS, WSS, WebRTC]
  auth:
    header: "X-Webitel-Access"
    description:: "All HTTPS requests and WebSocket handshakes must include this token."

# -------------------------------------------------------------------------
# 1. REST API: CONFIGURATION & ASSETS
# -------------------------------------------------------------------------
rest_api:
  config:
    - path: "/api/call_center/agents"
      method: "GET"
      query: { id: "int", fields: "screen_control", page: 1, size: 1 }
      desc: "Validates agent monitoring permissions (screen_control: bool)."

    - path: "/api/settings"
      method: "GET"
      query: { name: "screenshot_interval" }
      desc: "Global polling interval for automated screen capture."

  storage:
    - path: "/api/storage/file/{agentId}/upload"
      method: "POST"
      content_type: "image/png"
      params: { channel: "screensharing", thumbnail: bool, name: "string" }
      desc: "Binary PNG upload for periodic snapshots."

    - path: "/api/storage/file/{callId}/upload"
      method: "POST"
      content_type: "multipart/form-data"
      params: { channel: "screensharing", start_time: "ts", end_time: "ts" }
      desc: "Final MP4 session recording upload (3-attempt retry policy)."

# -------------------------------------------------------------------------
# 2. WEBRTC & MEDIA SPECIFICATIONS
# -------------------------------------------------------------------------
media_engine:
  signaling:
    path: "/api/webrtc/video"
    methods:
      POST: "SDP Offer/Answer exchange for live streaming."
      DELETE: "Termination of media listener & file finalization."

  stack:
    video: "VP8 / H.264 (Baseline/Main) | Target: 1280x720 @ 15fps"
    audio: "Opus (WebRTC) / MP3 (Local) | 48kHz Stereo"
    capture:
      win: "FFmpeg (gdigrab + dshow) | amix (Mic + System)"
      mac: "Native ScreenCapturer"

  metrics: [bitrate, fps, rtt, packet_loss, resolution]

# -------------------------------------------------------------------------
# 3. WEBSOCKET PROTOCOL (WSS)
# -------------------------------------------------------------------------
websocket:
  endpoint: "wss://{domain}/ws/websocket"

  inbound_events:
    hello: "Connection handshake & auth challenge trigger."
    agent_status: "Presence updates (online, offline, pause)."
    call:
      triggers: ["ringing", "update", "hangup"]
      logic: "Start capture if record_screen == true."
    channel:
      logic: "Post-processing (Wrap-up) tracking via 'wrap_time' status."
    notification:
      actions: ["screen_share", "screenshot", "screen_record_start", "screen_record_stop"]
      req_ack: true

  outbound_actions:
    authentication_challenge: { token: "string" }
    agent_session: "Recovery of agent context."
    ack: { ack_id: "uuid", error: "string?" }
    ss_accept: { id: "uuid", sdp: "sdp_answer", to_user_id: "int" }

  system_logic:
    sequence: "Sequential 'seq' increment with 5ms interval queue."
    resilience: "Exponential backoff (5s); Auto-stop on network loss."